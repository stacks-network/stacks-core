# Generate a sha512 checksum for the build archive
name: Generate Checksum

inputs:
  hashfile_name:
    description: "The name of the generated checksum file"
    required: false
    default: "CHECKSUMS.txt"
  artifact_download_pattern:
    description: "The pattern of artifacts to download. Defaults to '*' (all artifacts)"
    required: false
    default: "*"

runs:
  using: "composite"
  steps:
    # Downloads the artifacts built in `create-source-binary.yml`
    - name: Download Artifacts
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      with:
        pattern: ${{ inputs.artifact_download_pattern }}
        path: release
        merge-multiple: true

    # Generate a checksums file to be added to the release page
    - name: Generate Checksums
      shell: bash
      run: |
        # shellcheck disable=SC1091
        source ./.github/scripts/logging.sh

        ## ── Check for required binaries ─────────────────────────────────────
        if ! command -v sha512sum > /dev/null 2>&1; then
            error "$(hl "sha512sum") command not found"
            exit 1
        fi

        ## ── Generate checksums ──────────────────────────────────────────────
        cd release || {
            error "Artifact directory $(hl "release") does not exist"
            exit 1
        }

        shasum="$(sha512sum *)" || {
            error "Checksum could not be generated"
            exit 1
        }

        info "Generated checksums:"
        echo "${shasum}"
        echo "${shasum}" > "../${{ inputs.hashfile_name }}"
