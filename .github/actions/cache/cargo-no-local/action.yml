name: Cargo Cache (Without Local Crates)
description: |
    Rust Cargo cache without local crates. Used to build the test archive.
    All non-local crates are cached based on runner OS and Cargo.lock hash.
    This speeds up test archive generation without deleting local build artifacts.
    See: https://github.com/actions/cache/blob/main/examples.md#rust---cargo

inputs:
  action:
    description: "Type of operation (restore,save)"
    required: false
    default: ""
  fail-on-cache-miss:
    description: "Fail workflow if cache is not restorable"
    required: false
    default: "true"

outputs:
  cache-hit:
    description: "Cache Hit"
    value: ${{ steps.check-cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    # Initialize the cache key and dynamic exclusion paths
    - name: Set Cache Key and Paths
      shell: bash
      run: |
        echo "CARGO_NO_LOCAL_CACHE_KEY=cache-cargo-no-local-crates--${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}" >> "$GITHUB_ENV"

        # Define base paths to always include
        PATHS="~/.cargo/bin/
        ~/.cargo/registry/index/
        ~/.cargo/registry/cache/
        ~/.cargo/git/db/
        target/"

        if [ -f Cargo.toml ]; then
          echo "Identifying local workspace crates to exclude from cache..."
          while read -r crate; do
            crate_dash="${crate}"
            crate_under="${crate//-/_}"
            
            # Append negative patterns to exclude local crate build artifacts
            PATHS="$PATHS
        !target/**/deps/${crate_dash}-*
        !target/**/deps/lib${crate_dash}-*
        !target/**/deps/${crate_under}-*
        !target/**/deps/lib${crate_under}-*
        !target/**/.fingerprint/${crate_dash}-*
        !target/**/.fingerprint/${crate_under}-*
        !target/**/build/${crate_dash}-*
        !target/**/build/${crate_under}-*
        !target/*/${crate_dash}
        !target/*/${crate_under}"
          done < <(cargo metadata --format-version 1 --no-deps | jq -r '.packages[].name')
        fi

        # Save to a multi-line environment variable
        echo "CARGO_CACHE_PATHS<<EOF" >> "$GITHUB_ENV"
        echo "$PATHS" >> "$GITHUB_ENV"
        echo "EOF" >> "$GITHUB_ENV"
  
    # Check if cache data exists
    - name: Check Cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: check-cache
      with:
        lookup-only: true
        path: ${{ env.CARGO_CACHE_PATHS }}
        key: ${{ env.CARGO_NO_LOCAL_CACHE_KEY }}

    # Restore cache data
    - name: Restore Cache
      if: |
        inputs.action == 'restore' &&
        steps.check-cache.outputs.cache-hit == 'true'
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        fail-on-cache-miss: ${{ inputs.fail-on-cache-miss }}
        path: ${{ env.CARGO_CACHE_PATHS }}
        key: ${{ env.CARGO_NO_LOCAL_CACHE_KEY }}

    # Save cache data (Now purely handles exclusions via the path configurations)
    - name: Save Cache
      if: |
        inputs.action == 'save' &&
        steps.check-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ env.CARGO_CACHE_PATHS }}
        key: ${{ env.CARGO_NO_LOCAL_CACHE_KEY }}