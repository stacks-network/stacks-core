name: Build Test Archive Caches
description: |
    Builds nextest test archive cache

runs:
  using: "composite"
  steps:
    # Check if cargo cache exists
    - name: Check Cargo Cache (With Local Crates)
      uses: ./.github/actions/cache/cargo
      id: check-cargo-cache

    - name: Check Cargo Cache (Without Local Crates)
      uses: ./.github/actions/cache/cargo-no-local
      id: check-cargo-no-local-cache

    # Check if the nextest archive cache exists
    - name: Check Test Archive Cache
      uses: ./.github/actions/cache/test-archive
      id: check-test-archive-cache

    ####################################################################################
    ### Everything below is ONLY done if at least one of these caches does not exist.
    ### If they all exist, the below steps are skipped.
    ####################################################################################

    # Setup rust toolchain
    - name: Setup Rust Toolchain
      if: |
        steps.check-cargo-cache.outputs.cache-hit == 'false' ||
        steps.check-cargo-no-local-cache.outputs.cache-hit == 'false' ||
        steps.check-test-archive-cache.outputs.cache-hit == 'false'
      uses: ./.github/actions/setup-rust-toolchain
      with:
        components: llvm-tools-preview

    #  Only install dependencies if cache miss (i.e. no existing data)
    - name: Install Dependencies
      if: |
        steps.check-cargo-cache.outputs.cache-hit == 'false' ||
        steps.check-cargo-no-local-cache.outputs.cache-hit == 'false' ||
        steps.check-test-archive-cache.outputs.cache-hit == 'false'
      uses: ./.github/actions/install-tool
      with:
        tool: nextest

    # Build the nextest archive (which also builds our cargo file structure for caching)
    - name: Build and Archive Tests
      if: |
        steps.check-cargo-cache.outputs.cache-hit == 'false' ||
        steps.check-cargo-no-local-cache.outputs.cache-hit == 'false' ||
        steps.check-test-archive-cache.outputs.cache-hit == 'false'
      shell: bash
      run: |
        export RUSTFLAGS="-C instrument-coverage" && \
        cargo nextest archive \
          --workspace \
          --tests \
          --locked \
          --features monitoring_prom \
          --archive-file ~/test_archive.tar.zst

    # Save the nextest archive to cache
    - name: Cache Test Archive
      if: |
        steps.check-cargo-cache.outputs.cache-hit == 'false' ||
        steps.check-cargo-no-local-cache.outputs.cache-hit == 'false' ||
        steps.check-test-archive-cache.outputs.cache-hit == 'false'
      uses: ./.github/actions/cache/test-archive
      with:
        action: save

    # Save the cargo cache (with local crates)
    - name: Cache Cargo (With Local Crates)
      if: |
        steps.check-cargo-cache.outputs.cache-hit == 'false' ||
        steps.check-cargo-no-local-cache.outputs.cache-hit == 'false' ||
        steps.check-test-archive-cache.outputs.cache-hit == 'false'
      uses: ./.github/actions/cache/cargo
      with:
        action: save

    # Save the cargo cache (without local crates)
    # It's important that this happens last because local crate files are cleaned (deleted) during save
    - name: Cache Cargo (Without Local Crates)
      if: |
        steps.check-cargo-cache.outputs.cache-hit == 'false' ||
        steps.check-cargo-no-local-cache.outputs.cache-hit == 'false' ||
        steps.check-test-archive-cache.outputs.cache-hit == 'false'
      uses: ./.github/actions/cache/cargo-no-local
      with:
        action: save