name: Nextest Archive Cache
description: |
    Nextest binary archive for tests
    Includes contents of ./target/debug because they're needed for both unit tests and code coverage

inputs:
  action:
    description: "Type of operation (restore,save)"
    required: false
    default: ""
  archive-file:
    description: "The test archive file"
    required: true
  codecov-binary-path:
    description: "Code coverage binary path"
    required: false
    default: "./target/debug/"
  cache-key:
    description: "Cache key"
    required: false
    default: cache-test-archive--${{ github.event.repository.name }}-${{ github.event.pull_request.head.sha || github.sha }}

outputs:
  cache-hit:
    description: "Cache Hit"
    value: ${{ steps.check_cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    # Check if cache data exists
    - name: Check Cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: check_cache
      with:
        lookup-only: true
        path: |
          ${{ inputs.archive-file }}
          ${{ inputs.codecov-binary-path }}
        key: ${{ inputs.cache-key }}

    # Restore cache data
    - name: Restore Cache
      if: |
        inputs.action == 'restore' &&
        steps.check_cache.outputs.cache-hit == 'true'
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ inputs.archive-file }}
          ${{ inputs.codecov-binary-path }}
        key: ${{ inputs.cache-key }}

    # Save cache data
    - name: Save Cache
      if: |
        inputs.action == 'save' &&
        steps.check_cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ inputs.archive-file }}
          ${{ inputs.codecov-binary-path }}
        key: ${{ inputs.cache-key }}
