## Github workflow to run bitcoin tests

name: Tests::Bitcoin

on:
  workflow_call:

## env vars are transferred to composite action steps
env:
  BITCOIND_TEST: 1
  RUST_BACKTRACE: full
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 15
  TEST_TIMEOUT: 30

concurrency:
  group: bitcoin-tests-${{ github.head_ref || github.ref || github.run_id}}
  ## Only cancel in progress if this is for a PR
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  generate-tests:
    name: Generate JSON of tests to run
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      ## Setup test environment
      - name: Setup Test Environment
        id: setup_tests
        uses: stacks-network/actions/stacks-core/testenv@main
        with:
          btc-version: "25.0"
      - name: Generate tests JSON
        id: generate_tests_json
        run: |
          cargo nextest list --run-ignored only --bin stacks-node -Tjson | \
          jq '.["rust-suites"]["stacks-node::bin/stacks-node"]["testcases"] | map_values(select(.["ignored"] == true)) | keys' > ./tests.json
      - id: set-matrix
        run: |
          json_obj=`cat ./tests.json`
          echo "::set-output name=matrix::$JSON"

  # Bitcoin integration tests with code coverage
  integration-tests:
    needs: generate-tests
    name: Integration Tests
    runs-on: ubuntu-latest
    strategy:
      ## Continue with the test matrix even if we've had a failure
      fail-fast: false
      ## Run a maximum of 32 concurrent tests from the test matrix
      max-parallel: 32
      matrix:
        test-name: ${{fromJson(needs.generate-tests.outputs.matrix)}}
        exclude:
          - test: tests::bitcoin_regtest::bitcoind_integration_test_segwit
          - test: tests::epoch_205::bigger_microblock_streams_in_2_05
          - test: tests::epoch_205::test_cost_limit_switch_version205
