# Github workflow to run bitcoin tests in multiple github matrices

name: Tests::Bitcoin

on:
  workflow_dispatch:
    inputs:
      build-cache:
        type: boolean
        default: true
        description: Build the test cache before running tests
  workflow_call:

# set default permissions
permissions:
  contents: read

# env vars are transferred to composite action steps
env:
  BITCOIND_TEST: 1
  # Docker tag for the Bitcoin Core image used when spinning up container with `testcontainers` crate.
  BITCOIN_IMAGE_TAG: "25"
  RUST_BACKTRACE: full
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 15
  TEST_TIMEOUT: 30
  TEST_TAG_CI_SKIP: ci_skip
  # Number of active test partitions. Must not exceed the number of integration-tests-N jobs below.
  MATRIX: 2

# configure concurrency
concurrency:
  group: bitcoin-tests-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Always run create-cache regardless of trigger — downstream jobs depend on it.
  create-cache:
    name: Create Test Cache
    if: ${{ inputs.build-cache }}
    uses: ./.github/workflows/create-cache.yml

  generate-tests:
    name: Generate balanced test matrix
    needs: create-cache
    if: always() && !cancelled() && needs.create-cache.result != 'failure'
    runs-on: ubuntu-latest
    outputs:
      matrix1: ${{ steps.set-matrix.outputs.matrix1 }}
      matrix2: ${{ steps.set-matrix.outputs.matrix2 }}
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Download cache(s) and configure the runner to run test(s)
      - name: Setup Test Environment
        uses: ./.github/actions/testenv

      # Generate the bitcoin test matrices json used for running tests
      - name: Generate test matrices
        id: set-matrix
        run: bash ./.github/scripts/bitcoin_tests.sh

  integration-tests-1:
    name: Integration Tests 1
    needs:
      - generate-tests
      - create-cache
    runs-on: ubuntu-latest
    if: |
      always() && !cancelled() &&
      needs.create-cache.result != 'failure' &&
      needs.generate-tests.result != 'failure' &&
      needs.generate-tests.outputs.matrix1 != '[]'
    strategy:
      fail-fast: false
      max-parallel: 32
      matrix:
        test-name: ${{ fromJSON(needs.generate-tests.outputs.matrix1) }}
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Download cache(s) and configure the runner to run test(s)
      - name: Setup Test Environment
        uses: ./.github/actions/testenv

      # Run test matrix using restored cache of archive file
      #   - Test will timeout after env.TEST_TIMEOUT minutes
      - name: Run Tests
        timeout-minutes: ${{ fromJSON(env.TEST_TIMEOUT) }}
        uses: ./.github/actions/run-tests
        with:
          test-name: ${{ matrix.test-name }}

      # Generate code coverage
      - name: Code Coverage
        uses: ./.github/actions/codecov
        with:
          test-name: ${{ matrix.test-name }}

  integration-tests-2:
    name: Integration Tests 2
    needs:
      - generate-tests
      - create-cache
    runs-on: ubuntu-latest
    if: |
      always() && !cancelled() &&
      needs.create-cache.result != 'failure' &&
      needs.generate-tests.result != 'failure' &&
      needs.generate-tests.outputs.matrix2 != '[]'
    strategy:
      fail-fast: false
      max-parallel: 32
      matrix:
        test-name: ${{ fromJSON(needs.generate-tests.outputs.matrix2) }}
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Download cache(s) and configure the runner to run test(s)
      - name: Setup Test Environment
        uses: ./.github/actions/testenv

      # Run tests from the composite action
      - name: Run Tests
        timeout-minutes: ${{ fromJSON(env.TEST_TIMEOUT) }}
        uses: ./.github/actions/run-tests
        with:
          test-name: ${{ matrix.test-name }}

      # Generate code coverage
      - name: Code Coverage
        uses: ./.github/actions/codecov
        with:
          test-name: ${{ matrix.test-name }}

  # Check that all jobs in this workflow have succeeded.
  #   - will not run if the job is cancelled
  check-tests:
    name: Check Tests
    needs:
      - generate-tests
      - integration-tests-1
      - integration-tests-2
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Check if all jobs succeeded
      - name: Check Jobs Status
        shell: bash
        env:
          JOBS: ${{ toJson(needs) }}
          SUMMARY_PRINT: "true"
        run: bash ./.github/scripts/check_jobs_status.sh
