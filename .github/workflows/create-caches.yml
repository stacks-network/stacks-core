# Github workflow to create reusable caches

name: Create Reusable Caches

on:
  workflow_call:
    inputs:
      archive-file:
        description: "The test archive file"
        required: true
        type: string

# Set default permissions
permissions:
  contents: read

# Set default env vars
#   - transferred to composite action steps
env:
  RUSTFLAGS: "-Cinstrument-coverage -Awarnings"
  LLVM_PROFILE_FILE: "stacks-core-%p-%m.profraw"

# Configure concurrency
#   - cache will exist longer than workflow execution so other runners have access.
#   - multiple test workflows may call create-caches simultaneously for the same ref. They share a concurrency slot so only one actively builds; others wait and then find the caches already populated.
#   - runs on PR branches cancel old builds when a new commit arrives (github.head_ref is only set in a PR context).
concurrency:
  group: create-caches-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.head_ref != '' }}

jobs:
  # Check which caches already exist before creating them
  check-caches:
    name: Check Caches
    runs-on: ubuntu-latest
    outputs:
      bitcoin-cache-hit: ${{ steps.bitcoin.outputs.cache-hit }}
      cargo-cache-hit: ${{ steps.cargo.outputs.cache-hit }}
      cargo-no-local-cache-hit: ${{ steps.cargo-no-local.outputs.cache-hit }}
      test-archive-cache-hit: ${{ steps.test-archive.outputs.cache-hit }}
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Check cache for bitcoin binary (version is defined as a composite input, default is 25.0)
      - name: Check Bitcoin Cache
        id: bitcoin
        uses: ./.github/actions/cache/bitcoin
        
      # Check cache for cargo data (with local crates)
      - name: Check Cargo Cache (With Local Crates)
        id: cargo
        uses: ./.github/actions/cache/cargo

      # Check cache for cargo data (without local crates)
      - name: Check Cargo Cache (Without Local Crates)
        id: cargo-no-local
        uses: ./.github/actions/cache/cargo-no-local

      # Check cache for nextest archive
      - name: Check Test Archive Cache
        id: test-archive
        uses: ./.github/actions/cache/test-archive
        with:
          archive-file: ${{ inputs.archive-file }}

  # Cache the bitcoin binary
  cache-bitcoin-binary:
    name: Bitcoin Binary
    needs:
      - check-caches
    runs-on: ubuntu-latest
    if: needs.check-caches.outputs.bitcoin-cache-hit != 'true'
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Save bitcoin v${BTC_VERSION} cache
      - name: Bitcoin Cache
        uses: ./.github/actions/cache/bitcoin
        with:
          action: save

  # Cache nextest archives for tests
  cache-test-archive-and-cargo:
    name: Build & Cache Test Archive + Cargo
    needs:
      - check-caches
    runs-on: ubuntu-latest
    ####################################################################################
    ### Everything below is ONLY done if at least one of these caches does not exist.
    ### If they all exist, the below steps are skipped.
    ####################################################################################
    if: >-
      !cancelled() &&
      (needs.check-caches.outputs.test-archive-cache-hit != 'true' || 
       needs.check-caches.outputs.cargo-cache-hit != 'true' || 
       needs.check-caches.outputs.cargo-no-local-cache-hit != 'true')
    steps:
      # Checkout the code
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
     
      # Setup rust toolchain
      - name: Setup Rust Toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          components: llvm-tools-preview
     
      #  Only install dependencies if cache miss (i.e. no existing data)
      - name: Install nextest
        uses: ./.github/actions/install-tool
        with:
          tools: nextest
     
      # Build the nextest archive (which also builds our cargo file structure for caching)
      - name: Build and Archive Tests
        shell: bash
        run: |
          ARCHIVE_FILE=${{ inputs.archive-file }}
          
          export RUSTFLAGS="-C instrument-coverage" && \
          cargo nextest archive \
            --workspace \
            --tests \
            --locked \
            --features monitoring_prom \
            --archive-file $ARCHIVE_FILE
     
      # Save the nextest archive to cache
      - name: Cache Test Archive
        uses: ./.github/actions/cache/test-archive
        with:
          action: save
          archive-file: ${{ inputs.archive-file }}
     
      # Save the cargo cache (with local crates)
      - name: Cache Cargo (With Local Crates)
        uses: ./.github/actions/cache/cargo
        with:
          action: save
     
      # Save the cargo cache (without local crates)
      # IMPORTANT: this MUST happen last because local crates are cleaned (deleted) during save
      - name: Cache Cargo (Without Local Crates)
        uses: ./.github/actions/cache/cargo-no-local
        with:
          action: save
