name: Slack Open PR Nag Bot

on:
  schedule:
    # Run at 6am Eastern Time on Mon, Weds, Fri
    - cron: '0 6 * * 1,3,5'
      timezone: 'America/New_York'
  workflow_dispatch: # Allows manual testing

permissions:
  pull-requests: read

jobs:
  nag-slack:
    runs-on: ubuntu-latest
    # Only execute if running in our core repo
    if: github.repository == 'stacks-network/stacks-core'
    steps:
      - name: Fetch PRs and Post Nags to Slack
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_CORE_PR_NAG_DAILY }}
          
          # --- CONFIGURABLE VARIABLES ---
          TARGET_OWNER: 'stacks-network'
          TARGET_REPO: 'stacks-core'
          IGNORE_DRAFTS: 'true'
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
          
          # CENTRAL USER REGISTRY
          USER_MAPPING: |
            {
              "aaronb-stacks": "Aaron",
              "adriano-stacks": "Adriano",
              "benjamin-stacks": "Benjamin",
              "brice-stacks": "Brice",
              "cylewitruk-stacks": "Cyle",
              "dhaney-stacks": "David",
              "federico-stacks": "Federico",
              "francesco-stacks": "Francesco",
              "hstove-stacks": "Hank",
              "radu-stacks": "Radu",
              "rob-stacks": "Roberto",
              "simone-stacks": "Simone"
            }
          # ------------------------------
          
        with:
          script: |
            const owner = process.env.TARGET_OWNER;
            const repo = process.env.TARGET_REPO;
            const ignoreDrafts = process.env.IGNORE_DRAFTS === 'true';
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            const manualRun = process.env.MANUAL_RUN === 'true';

            if (!webhookUrl) {
              core.setFailed('Missing SLACK_WEBHOOK_URL secret.');
              return;
            }

            // 1. Parse Combined User Mapping JSON safely
            let userMap = {};
            try {
              const rawMap = JSON.parse(process.env.USER_MAPPING || '{}');
              userMap = Object.fromEntries(Object.entries(rawMap).map(([k, v]) => [k.toLowerCase(), v]));
            } catch (e) {
              core.setFailed('Error parsing USER_MAPPING JSON.');
              return;
            }

            const allowedUsers = new Set(Object.keys(userMap));

            const getDocName = (username) => {
              const clean = username.toLowerCase();
              if (userMap[clean]) return userMap[clean];
              const base = clean.replace('-stacks', '');
              return base.charAt(0).toUpperCase() + base.slice(1);
            };

            const sanitizeTitle = (title) => {
              return title
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\|/g, '—');
            };

            // 2. Fetch open Pull Requests
            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100
            });

            const filteredSortedPrs = prs
              .filter(pr => {
                if (ignoreDrafts && pr.draft) return false;
                return allowedUsers.has(pr.user.login.toLowerCase());
              })
              // Sort alphabetically by team meeting display name
              .sort((a, b) => {
                const authorA = getDocName(a.user.login).toLowerCase();
                const authorB = getDocName(b.user.login).toLowerCase();
                
                if (authorA !== authorB) {
                  return authorA.localeCompare(authorB);
                }
                // Secondary sort fallback: Oldest PRs first for a single author
                return new Date(a.created_at) - new Date(b.created_at);
              });

            if (filteredSortedPrs.length === 0) {
              console.log('No matching team PRs found.');
              return;
            }

            // 3. Construct the payload blocks incrementally to avoid limits
            const payload = { blocks: [] };
            
            payload.blocks.push({
              type: 'section',
              text: {
                type: 'mrkdwn',
                text: `*📋 Open PRs*${manualRun ? ' _(Manual Run)_' : ''}\n`
              }
            });

            let currentLines = [];
            for (const pr of filteredSortedPrs) {
              const author = getDocName(pr.user.login);
              const title = sanitizeTitle(pr.title);
              const reviewers = pr.requested_reviewers.map(r => getDocName(r.login)).join(', ') || 'Anyone';
              
              currentLines.push(`${author} <${pr.html_url}|${title}> (${reviewers})`);

              if (currentLines.length === 15) {
                payload.blocks.push({
                  type: 'section',
                  text: { type: 'mrkdwn', text: currentLines.join('\n') }
                });
                currentLines = [];
              }
            }

            if (currentLines.length > 0) {
              payload.blocks.push({
                type: 'section',
                text: { type: 'mrkdwn', text: currentLines.join('\n') }
              });
            }

            // 4. Send payload via Webhook
            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              core.setFailed(`Slack API responded with status ${response.status}`);
            } else {
              console.log(`Successfully posted ${filteredSortedPrs.length} PR lines to Slack.`);
            }
