name: Slack Open PR Nag Bot

on:
  schedule:
    # Runs at 12:00 UTC (7:00 AM EST / 8:00 AM EDT) every Monday through Friday
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Allows manual testing

permissions:
  pull-requests: read

jobs:
  nag-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch PRs and Post Nags to Slack
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_CORE_PR_NAG_DAILY }}
          
          # --- CONFIGURABLE VARIABLES ---
          TARGET_OWNER: 'stacks-network'
          TARGET_REPO: 'stacks-core'
          STALE_HOURS_THRESHOLD: '72' # 3 days
          ANGRY_RED_HOURS_THRESHOLD: '168' # 1 week (7 days)
          IGNORE_DRAFTS: 'true'
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
          
          # MAP GITHUB USERNAMES TO SLACK MEMBER IDs
          USER_MAPPING: |
            {
              "aaronb-stacks": "U067F1SRYT0",
              "adriano-stacks": "U07CAH5D38Q",
              "benjamin-stacks": "U09N5BM0SGP",
              "brice-stacks": "U067BVCJE30",
              "cylewitruk-stacks": "U06815BCSB0",
              "dhaney-stacks": "U09538PV0RZ",
              "federico-stacks": "U08ASJ1LKEV",
              "francesco-stacks": "U07MCETKTKN",
              "hstove-stacks": "U068W8VBSQM",
              "radu-stacks": "U0ANRRXD080",
              "rob-stacks": "U07UNFAS4BD",
              "simone-stacks": "U09NA1TP8PK"
            }
          # ------------------------------
          
        with:
          script: |
            const owner = process.env.TARGET_OWNER;
            const repo = process.env.TARGET_REPO;
            const staleHours = parseInt(process.env.STALE_HOURS_THRESHOLD, 10);
            const angryRedHours = parseInt(process.env.ANGRY_RED_HOURS_THRESHOLD, 10);
            const ignoreDrafts = process.env.IGNORE_DRAFTS === 'true';
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            const manualRun = process.env.MANUAL_RUN === 'true';

            if (!webhookUrl) {
              core.setFailed('Missing SLACK_WEBHOOK_URL secret.');
              return;
            }

            // 1. Parse User Mapping JSON safely
            let userMap = {};
            try {
              userMap = JSON.parse(process.env.USER_MAPPING || '{}');
              userMap = Object.fromEntries(Object.entries(userMap).map(([k, v]) => [k.toLowerCase(), v]));
            } catch (e) {
              core.setFailed('Error parsing USER_MAPPING JSON. Script cannot determine team whitelist.');
              return;
            }

            const allowedUsers = new Set(Object.keys(userMap));

            const resolveMention = (githubUsername) => {
              const cleanName = githubUsername.toLowerCase();
              return userMap[cleanName] ? `<@${userMap[cleanName]}>` : `\`@${githubUsername}\``;
            };

            // 2. Fetch open Pull Requests
            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const filteredSortedPrs = prs
              .filter(pr => {
                if (ignoreDrafts && pr.draft) return false;
                return allowedUsers.has(pr.user.login.toLowerCase());
              })
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            if (filteredSortedPrs.length === 0) {
              console.log('No matching team PRs found.');
              return;
            }

            const payload = {
              blocks: [
                {
                  type: 'header',
                  text: { type: 'plain_text', text: '⏳ Open PR Review Reminders' + (manualRun ? ' (Manually Run)' : ''), emoji: true }
                }
              ],
              attachments: []
            };

            const now = new Date();

            // 3. Build color-coded attachments
            for (const pr of filteredSortedPrs) {
              const createdAt = new Date(pr.created_at);
              const ageInHours = (now - createdAt) / (1000 * 60 * 60);

              // NOTE: Uncomment the 3 lines below if you want to completely EXCLUDE fresh "Green" PRs from the Slack digest.
              // if (ageInHours < staleHours) {
              //   continue;
              // }

              let sidebarColor = '#2EB67D'; // Slack Green
              let statusEmoji = '🟢';

              if (ageInHours > angryRedHours) {
                sidebarColor = '#E01E5A';  // Slack Red
                statusEmoji = '🔴';
              } else if (ageInHours >= staleHours) {
                sidebarColor = '#ECB22E';  // Slack Yellow
                statusEmoji = '🟡';
              }

              const days = Math.floor(ageInHours / 24);
              const hours = Math.floor(ageInHours % 24);
              const ageStr = days > 0 ? `${days}d ${hours}h` : `${hours}h`;
              
              const authorText = resolveMention(pr.user.login);
              const reviewers = pr.requested_reviewers.map(r => resolveMention(r.login)).join(', ') || '_None requested_';

              payload.attachments.push({
                color: sidebarColor,
                blocks: [
                  {
                    type: 'section',
                    text: {
                      type: 'mrkdwn',
                      text: `${statusEmoji} *<${pr.html_url}|#${pr.number}: ${pr.title}>*\n• *Age:* \`${ageStr}\` | *Author:* ${authorText}\n• *Assigned Reviewers:* ${reviewers}`
                    }
                  }
                ]
              });
            }

            // Check if any attachments actually made it through the filters
            if (payload.attachments.length === 0) {
              console.log('No open PRs met the threshold criteria.');
              return;
            }

            // 4. Send payload via Webhook
            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              core.setFailed(`Slack API responded with status ${response.status}`);
            } else {
              console.log(`Successfully nagged the team about ${payload.attachments.length} PR(s).`);
            }