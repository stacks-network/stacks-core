# Check constants output with stacks-inspect

name: Constants Check

on:
  workflow_call:

# set default permissions
permissions:
  contents: read

# set default shell
defaults:
  run:
    shell: bash

# configure concurrency
concurrency:
  group: constants-check-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-consts:
    name: Check the constants from stacks-inspect
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      # Setup the default rust toolchain
      - name: Setup Rust Toolchain
        uses: ./.github/actions/setup-rust-toolchain

      # Dump constants from stacks-inspect
      - name: Dump constants JSON
        run: |
          cargo run --bin stacks-inspect -- dump-consts | tee out.json

      # Output any diff to the github job summary
      - name: Compare expected constants JSON
        run: |
          diff out.json ./sample/expected_consts.json >> $GITHUB_STEP_SUMMARY
