name: Constants Check

# Only run when:
#   - PRs are (re)opened against develop branch
on:
  workflow_call:

jobs:
  check-consts:
    name: Check the constants from stacks-inspect
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout the latest code
        id: git_checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download constants artifact
        uses: actions/download-artifact@v4
        with:
          name: constants-dump

      - name: Compare expected constants JSON
        id: expects-json
        run: |
          diff constants.json ./sample/expected_consts.json >> $GITHUB_STEP_SUMMARY
