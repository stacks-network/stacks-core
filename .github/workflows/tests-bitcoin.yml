# Github workflow to run bitcoin tests in multiple github matrices

name: Tests::Bitcoin

on:
  workflow_call:
    inputs:
      archive-file:
        description: "The test archive file"
        required: true
        type: string

# Set default permissions
permissions:
  contents: read

# Set default env vars
#   - transferred to composite action steps
env:
  BITCOIND_TEST: 1
  # Docker tag for the Bitcoin Core image used when spinning up container with `testcontainers` crate.
  BITCOIN_IMAGE_TAG: "25"
  RUST_BACKTRACE: full
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 15
  TEST_TIMEOUT: 30
  TEST_TAG_CI_SKIP: ci_skip
  # Configurable batch size per partitioned set of matrixed tests 
  BATCH_SIZE: 5

# Configure concurrency
concurrency:
  group: bitcoin-tests-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Generate list of tests to run
  #  - split into batched matrices of size BATCH_SIZE defined in the env var above (via .github/scripts/bitcoin-tests.sh)
  generate-tests:
    name: Generate Batched Test Matrix
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.set-matrix.outputs.batches }}
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Generate the bitcoin test matrices json used for running tests
      - name: Generate test matrices
        id: set-matrix
        run: bash ./.github/scripts/bitcoin_tests.sh

  # Dynamically run one runner per batch generated by the script
  integration-tests:
    name: Integration Tests
    needs:
      - generate-tests
    runs-on: ubuntu-latest
    if: |
      always() && !cancelled() &&
      needs.generate-tests.result != 'failure' &&
      needs.generate-tests.outputs.batches != '[]'
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJSON(needs.generate-tests.outputs.batches) }}
    steps:
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Setup, run tests, generate and upload code coverage artifact
      - name: Setup + Run Tests + Codecov
        timeout-minutes: ${{ fromJSON(env.TEST_TIMEOUT) }}
        uses: ./.github/actions/run-tests
        with:
          test-names: ${{ matrix.batch.csv }}
          codecov-test-name: batched-integration-tests-${{ matrix.batch.index }}

  # Check that all jobs in this workflow have succeeded.
  check-tests:
    name: Check Tests
    needs:
      - generate-tests
      - integration-tests
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Check if all jobs succeeded
      - name: Check Jobs Status
        shell: bash
        env:
          JOBS: ${{ toJson(needs) }}
          SUMMARY_PRINT: "true"
        run: bash ./.github/scripts/check_jobs_status.sh
