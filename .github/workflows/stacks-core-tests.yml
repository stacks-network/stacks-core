# Github workflow to run full genesis and unit tests

name: Tests::Stacks Core

on:
  workflow_dispatch:
    inputs:
      build-cache:
        type: boolean
        default: true
        description: Build the test cache before running tests
  workflow_call:

# set default permissions
permissions:
  contents: read
# env vars are transferred to composite action steps
env:
  BITCOIND_TEST: 1
  RUST_BACKTRACE: full
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 3
  TEST_TIMEOUT: 30
  CI: true  # Required by insta snapshot tests to run in CI

# configure concurrency
concurrency:
  group: stacks-core-tests-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Always run create-cache regardless of trigger — downstream jobs depend on it.
  create-cache:
    name: Create Test Cache
    if: ${{ inputs.build-cache }}
    uses: ./.github/workflows/create-cache.yml

  # Unit tests with code coverage
  unit-tests:
    name: Unit Tests
    needs: create-cache
    # Run if create-cache succeeded OR was skipped (caches already existed from a prior run).
    # Do not run if create-cache genuinely failed.
    if: always() && !cancelled() && needs.create-cache.result != 'failure'
    runs-on: ubuntu-latest
    # Continue the workflow in case a step fails (ex a single test fails)
    # continue-on-error: true
    strategy:
      # Continue the workflow in case a step fails (ex a single test fails)
      fail-fast: false
      matrix:
        # Partition unit tests into 8 concurrent jobs
        partition: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
    # Checkout the code
    #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Download cache(s) and configure the runner to run test(s)
      - name: Setup Test Environment
        uses: ./.github/actions/testenv

      # Run test matrix using restored cache of archive file
      #   - Test will timeout after env.TEST_TIMEOUT minutes
      - name: Run Tests
        timeout-minutes: ${{ fromJSON(env.TEST_TIMEOUT) }}
        uses: ./.github/actions/run-tests/partition
        with:
          partition: ${{ matrix.partition }}
          total-partitions: 8

      # Create and upload code coverage file
      - name: Code Coverage
        if: github.event.repository.visibility == 'public'
        uses: ./.github/actions/codecov
        with:
          test-name: ${{ github.job }}-${{ matrix.partition }}

  # Generate and upload openapi html artifact
  open-api-validation:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    steps:
    # Checkout the code
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Generate OpenAPI documentation
        uses: ./.github/actions/openapi
        with:
          input: "./docs/rpc/openapi.yaml"
          output: "./openapi-docs.html"
          config: "./docs/rpc/redocly.yaml"
          validate: "true"
          redocly-version: "2.19"

  # Generate and upload node configuration documentation
  node-config-docsgen:
    name: Node Configuration Documentation
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Generate Node Configuration Documentation
        uses: ./.github/actions/config-docsgen

  # Core contract tests
  core-contracts-clarinet-test:
    name: Core Contracts Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./contrib/core-contract-tests/"
    steps:
      # Checkout the code
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Execute core contract unit tests with clarinet-sdk
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.x
          cache: "npm"
          cache-dependency-path: "./contrib/core-contract-tests/package-lock.json"
      - run: npm ci
      - run: npm test

  # Check that all jobs in this workflow have succeeded.
  #   - will not run if the job is cancelled
  check-tests:
    name: Check Tests
    needs:
      - unit-tests
      - open-api-validation
      - node-config-docsgen
      - core-contracts-clarinet-test
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Check if all jobs succeeded
      - name: Check Jobs Status
        shell: bash
        env:
          JOBS: ${{ toJson(needs) }}
          SUMMARY_PRINT: "true"
        run: bash ./.github/scripts/check_jobs_status.sh
