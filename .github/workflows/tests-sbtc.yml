# Github workflow to run sbtc tests

name: Tests::SBTC

on:
  workflow_call:
    inputs:
      archive-file:
        description: "The test archive file"
        required: true
        type: string

# Set default permissions
permissions:
  contents: read

# Set default env vars
#   - transferred to composite action steps
env:
  BITCOIND_TEST: 1
  RUST_BACKTRACE: full
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 15
  TEST_TIMEOUT: 30

# Configure concurrency
concurrency:
  group: sbtc-tests-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Bitcoin integration tests with code coverage
  sbtc-tests:
    name: SBTC Tests
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    strategy:
      # Continue with the test matrix even if we've had a failure
      fail-fast: false
      matrix:
        test-name:
          - tests::stackerdb::test_stackerdb_event_observer
          - tests::stackerdb::test_stackerdb_load_store
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Setup, run tests, generate and upload code coverage artifact
      - name: Setup + Run Tests + Codecov
        timeout-minutes: ${{ fromJSON(env.TEST_TIMEOUT) }}
        uses: ./.github/actions/setup-run-tests-codecov
        with:
          test-names: ${{ matrix.test-name }}
          codecov-test-name: ${{ matrix.test-name }}
          archive-file: ${{ inputs.archive-file }}

  # Check that all jobs in this workflow have succeeded.
  #   - will not run if the job is cancelled
  check-tests:
    name: Check Tests
    needs:
      - sbtc-tests
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Check if all jobs succeeded
      - name: Check Jobs Status
        shell: bash
        env:
          JOBS: ${{ toJson(needs) }}
          SUMMARY_PRINT: "true"
        run: bash ./.github/scripts/check_jobs_status.sh
