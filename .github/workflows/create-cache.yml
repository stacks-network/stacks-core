# Github workflow to create reusable caches

name: Create Test Cache

on:
  workflow_dispatch:
  workflow_call:

# set default permissions
permissions:
  contents: read

# env vars are transferred to composite action steps
env:
  RUSTFLAGS: "-Cinstrument-coverage -Awarnings"
  LLVM_PROFILE_FILE: "stacks-core-%p-%m.profraw"
  BTC_VERSION: "25.0"

# configure concurrency
# - Cache will exist longer than workflow execution so other runners have access. However, this is only relevant if the commit sha does not change between runs.
# - Multiple test workflows may call create-cache simultaneously for the same ref. They share a concurrency slot so only one actively builds; others wait and then find the caches already populated.
# - Runs on PR branches cancel old builds when a new commit arrives (github.head_ref is only set in a PR context).
concurrency:
  group: create-cache-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.head_ref != '' }}

jobs:
  # Check which caches already exist before creating them
  check-caches:
    name: Check Caches
    runs-on: ubuntu-latest
    outputs:
      bitcoin-cache-hit: ${{ steps.bitcoin.outputs.cache-hit }}
      cargo-cache-hit: ${{ steps.cargo.outputs.cache-hit }}
      cargo-target-cache-hit: ${{ steps.cargo-target.outputs.cache-hit }}
      test-archive-cache-hit: ${{ steps.test-archive.outputs.cache-hit }}
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Check cache for bitcoin v${BTC_VERSION}
      - name: Check Bitcoin Cache
        id: bitcoin
        uses: ./.github/actions/cache/bitcoin

      # Check cache for cargo data
      - name: Check Cargo Cache
        id: cargo
        uses: ./.github/actions/cache/cargo

      # Check cache for target data
      - name: Check Cargo Target Cache
        id: cargo-target
        uses: ./.github/actions/cache/cargo-target

      # Check cache for nextest archive
      - name: Check Test Archive Cache
        id: test-archive
        uses: ./.github/actions/cache/test-archive

  # Cache cargo data
  cargo:
    name: Cargo
    needs: check-caches
    runs-on: ubuntu-latest
    if: needs.check-caches.outputs.cargo-cache-hit != 'true'
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Save cargo cache
      - name: Cargo Cache
        uses: ./.github/actions/cache/cargo
        with:
          action: save

  # Cache the bitcoin binary
  bitcoin-binary:
    name: Bitcoin Binary
    needs: check-caches
    runs-on: ubuntu-latest
    if: needs.check-caches.outputs.bitcoin-cache-hit != 'true'
    steps:
      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Save bitcoin v${BTC_VERSION} cache
      - name: Bitcoin Cache
        uses: ./.github/actions/cache/bitcoin
        with:
          action: save

  # Cache nextest archives for tests
  nextest-archive:
    name: Test Archive
    needs:
      - check-caches
      - cargo
    runs-on: ubuntu-latest
    # Run if test-archive is missing; tolerate cargo being skipped (cache already existed)
    #   - If the cargo target cache (or the test-archive cache) is missing, then we'll need to rebuild the test archive and cache both the archive and cargo target (cargo archive is required for code coverage).
    if: >-
      !cancelled() &&
      (needs.cargo.result == 'success' || needs.cargo.result == 'skipped') &&
      (needs.check-caches.outputs.cargo-target-cache-hit != 'true' ||
      needs.check-caches.outputs.test-archive-cache-hit != 'true')
    steps:
      # Checkout the code
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      # Build and cache the nextest archive
      - name: Build Nextest Cache
        uses: ./.github/actions/cache/build-cache
