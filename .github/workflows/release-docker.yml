# Github workflow to create release docker images
#   - uses binary archives produced by the ./release-build.yml workflow

name: Docker Release Images

on:
  workflow_call:
    inputs:
      node_tag:
        description: "Node Docker Release Tag"
        required: true
        type: string
      signer_tag:
        description: "Signer Docker Release Tag"
        required: true
        type: string
      release_type:
        description: "Release type (one of stacks-core, stacks-signer"
        required: true
        type: string

# set default permissions
permissions:
  contents: read

# set default shell
defaults:
  run:
    shell: bash

# configure concurrency
concurrency:
  group: release-docker-${{ inputs.release_type }}-${{ github.head_ref || github.ref }}
  # Always cancel duplicate jobs
  cancel-in-progress: true

run-name: ${{ inputs.node_tag || inputs.signer_tag }}

env:
  # build for both x64 and arm64 arch
  DOCKER_PLATFORMS: "linux/amd64,linux/arm64"
  # publish images to ghcr
  DOCKER_REGISTRY: "ghcr.io"
  # do not generate provenance from the docker build step, instead attest the image specifically
  PROVENANCE: false

jobs:
  release-images:
    name: Docker Image (${{ inputs.release_type }}, ${{ matrix.dist }})
    if: |
      ( inputs.release_type == 'stacks-core' || inputs.release_type == 'stacks-signer') &&
      ( inputs.signer_tag != '' || inputs.node_tag != '' )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Build a maximum of 2 images concurrently based on matrix.dist
      max-parallel: 2
      matrix:
        dist:
          - alpine
          - debian
    permissions:
      contents: read       # required for checkout
      id-token: write      # required for attestation
      attestations: write  # required for attestation
      packages: write      # required for image push
    steps:
      # Retrieve repository description for image annotation
      - name: Get repository description
        id: repo-desc
        run: |
          description=$(gh api repos/${{ github.repository }} --jq '.description')
          echo "description=$description" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      # Set local env vars
      - name: Set Local Vars
        id: set-vars
        run: |
          var_dockerfile_name="Dockerfile"
          var_build_arch=glibc # default build architecture to glibc
          var_docker_tag_rc=false
          if [ "${{ matrix.dist }}" == "alpine" ]; then
            var_build_arch=musl
          fi
          # set a default docker image: registry/repo/release_type
          var_default_image="${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ inputs.release_type }}"
          var_artifact_pattern="${{ github.sha }}-${{ inputs.release_type }}-linux-${var_build_arch}*"
          if [ "${{ inputs.release_type }}" == "stacks-signer" ]; then
            # stacks-signer
            var_dockerfile_name="Dockerfile.signer"
            var_images="${var_default_image}" # use default, set in conditional to allow for individual changes based on release type
            var_docker_tag=${{ inputs.signer_tag }} # use the input signer_tag if this is the stacks-signer build
            var_annotation_pattern="Stacks Signer"
          else
            # stacks-core
            var_images="${var_default_image}" # use default, set in conditional to allow for individual changes based on release type
            var_docker_tag=${{ inputs.node_tag }} # use the input node_tag if this is the stacks-node build
            var_annotation_pattern="Stacks Core"
          fi
          # Set docker rc tag if branch is named `..-rc[0-9]`
          if [[ "${var_docker_tag}" =~ -rc[0-9]*$ ]]; then
            # is a release candidate
            var_docker_tag_rc=true
          fi
          # Add vars to github output for later steps
          {
            echo "docker_images=${var_images}"
            echo "docker_tag=${var_docker_tag}"
            echo "artifact_pattern=${var_artifact_pattern}"
            echo "annotation_pattern=${var_annotation_pattern}"
            echo "dockerfile_name=${var_dockerfile_name}"
            echo "docker_tag_rc=${var_docker_tag_rc}"
          } >> "${GITHUB_OUTPUT}"

      # Checkout the code
      #   - only .github is required for this job
      - name: Checkout the latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          sparse-checkout: |
            .github

      # Download binary artifacts
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ${{ steps.set-vars.outputs.artifact_pattern }}
          path: /tmp/release
          merge-multiple: true

      # Setup Docker for the builds
      - name: Docker setup
        id: docker-setup
        uses: ./.github/actions/docker
        with:
          registry: ${{ env.DOCKER_REGISTRY }} # set the registry to ghcr (default is docker.io)
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set docker metatdata
      - name: Docker Metadata ( ${{ matrix.dist }} )
        id: docker-metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf #v6.0.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: |
            ${{ steps.set-vars.outputs.docker_images }}
          labels: |
            org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}
            org.opencontainers.image.version=${{ steps.set-vars.outputs.docker_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ inputs.release_type }}
          annotations: |
            org.opencontainers.image.title=${{ inputs.release_type }}
            org.opencontainers.image.description=${{ steps.repo-desc.outputs.description }} | ${{ steps.set-vars.outputs.annotation_pattern }} Image
          tags: |
            # debian tags #
            #  latest tag
            type=raw,value=latest,enable=${{ steps.set-vars.outputs.docker_tag != '' && steps.set-vars.outputs.docker_tag_rc != 'true' && matrix.dist == 'debian' }}
            #  latest-debian tag
            type=raw,value=latest,suffix=-${{ matrix.dist }},enable=${{ steps.set-vars.outputs.docker_tag != '' && steps.set-vars.outputs.docker_tag_rc != 'true' && matrix.dist == 'debian' }}
            #  version tag
            type=raw,value=${{ steps.set-vars.outputs.docker_tag }},enable=${{ steps.set-vars.outputs.docker_tag != '' && matrix.dist == 'debian'}}
            #  version-dist tag
            type=raw,value=${{ steps.set-vars.outputs.docker_tag }},suffix=-${{ matrix.dist }},enable=${{ steps.set-vars.outputs.docker_tag != '' && matrix.dist == 'debian' }}
            #
            # alpine tags #
            #   latest-alpine tag
            type=raw,value=latest,suffix=-${{ matrix.dist }},enable=${{ steps.set-vars.outputs.docker_tag != '' && steps.set-vars.outputs.docker_tag_rc != 'true' && matrix.dist == 'alpine' }}
            #  version-dist tag
            type=raw,value=${{ steps.set-vars.outputs.docker_tag }},suffix=-${{ matrix.dist }},enable=${{ steps.set-vars.outputs.docker_tag != '' && matrix.dist == 'alpine' }}

      # Build docker image for release
      - name: Build and Push ( ${{matrix.dist}} )
        id: docker-build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          sbom: false
          provenance: ${{ env.PROVENANCE }}
          context: /tmp
          file: ./.github/dockerfiles/${{ matrix.dist }}/${{ steps.set-vars.outputs.dockerfile_name }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.docker-metadata.outputs.tags }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          annotations: ${{ steps.docker-metadata.outputs.annotations }} # Note: annotations are used for multi-architecture ghcr images
          push: ${{ steps.docker-setup.outputs.docker_push }} # defined in .github/actions/docker composite

      # Generate docker image attestation(s)
      - name: Attest Image (${{ github.event.repository.name }})
        if: |
          env.PROVENANCE != true
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-name: ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ inputs.release_type }}
          subject-digest: ${{ steps.docker-build.outputs.digest }}
          push-to-registry: ${{ steps.docker-setup.outputs.docker_push }} # defined in .github/actions/docker composite

      # Sign the images with GitHub OIDC Token
      #   - https://github.blog/security/supply-chain-security/safeguard-container-signing-capability-actions/
      #   - annotations show as null per https://github.com/sigstore/cosign/pull/4508 until a future release (or tagging this specific commit)
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      # Sign the images with Github OIDC token
      - name: Sign the images with OIDC Token
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
          TAGS: ${{ steps.docker-metadata.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign \
            -a "repo=${{ github.repository }}" \
            -a "ref=${{ github.sha }}" \
            -a "dist=${{ matrix.dist }}" \
            --yes \
          ${images}
