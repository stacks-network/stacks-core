# https://docs.codecov.com/docs/codecovyml-reference
codecov:
  require_ci_to_pass: false
  notify:
    manual_trigger: true
coverage:
  range: 60..79
  round: down
  precision: 2
  status:
    changes: off
    patch:
      default:
        target: auto
        threshold: 0%
    project:
      default:
        target: auto
        threshold: 0%
comment:
  layout: "condensed_header, diff, files, footer"
  behavior: new
  hide_project_coverage: false
github_checks:
  annotations: false
