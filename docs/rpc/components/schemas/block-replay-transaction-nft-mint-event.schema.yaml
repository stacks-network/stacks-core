type: object
required:
  - committed
  - event_index
  - nft_mint_event
  - txid
  - type
properties:
  committed:
    type: boolean
  event_index:
    type: integer
  nft_mint_event:
    type: object
    required:
      - asset_identifier
      - raw_value
      - recipient
    properties:
      asset_identifier:
        type: string
      raw_value:
        type: string
      recipient:
        type: string
  txid:
    type: string
  type:
    type: string
    enum:
      - nft_mint_event
