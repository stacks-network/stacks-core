description: POST response for estimated fee
type: object
additionalProperties: false
required:
  - estimated_cost
  - estimated_cost_scalar
  - cost_scalar_change_by_byte
  - estimations
properties:
  estimated_cost:
    $ref: "./execution-cost.schema.yaml"
  estimated_cost_scalar:
    type: integer
    minimum: 0
  cost_scalar_change_by_byte:
    type: number
    minimum: 0
  estimations:
    type: array
    items:
      type: object
      properties:
        fee_rate:
          type: number
          minimum: 0
        fee:
          type: integer
          minimum: 0
