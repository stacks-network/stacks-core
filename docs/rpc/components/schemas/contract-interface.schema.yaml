description: The interface of a Clarity smart contract.
type: object
required:
  - functions
  - variables
  - maps
  - fungible_tokens
  - non_fungible_tokens
  - epoch
  - clarity_version
properties:
  functions:
    type: array
    description: List of defined methods
    items:
      type: object
      required: [name, access, args, outputs]
      properties:
        name:
          type: string
        access:
          type: string
          enum: [public, private, read_only]
        args:
          type: array
          items:
            type: object
            required: [name, type]
            properties:
              name:
                type: string
              type:
                $ref: "./clarity-type.schema.yaml"
        outputs:
          type: object
          required: [type]
          properties:
            type:
              $ref: "./clarity-type.schema.yaml"
  variables:
    type: array
    description: List of defined constants
    items:
      type: object
      required: [name, type, access]
      properties:
        name:
          type: string
        type:
          $ref: "./clarity-type.schema.yaml"
        access:
          type: string
          enum: [constant, variable]
  maps:
    type: array
    description: List of defined data-maps
    items:
      type: object
      required: [name, key, value]
      properties:
        name:
          type: string
        key:
          $ref: "./clarity-type.schema.yaml"
        value:
          $ref: "./clarity-type.schema.yaml"
  fungible_tokens:
    type: array
    description: List of fungible tokens in the contract
    items:
      type: object
      required: [name]
      properties:
        name:
          type: string
  non_fungible_tokens:
    type: array
    description: List of non-fungible tokens in the contract
    items:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          $ref: "./clarity-type.schema.yaml"
  epoch:
    type: string
    description: Stacks epoch identifier (e.g., "Epoch30").
  clarity_version:
    type: string
    description: Clarity language version used by this contract.
    enum: [Clarity1, Clarity2, Clarity3]
